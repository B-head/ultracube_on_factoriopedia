[mod-setting-name]
ultracube-on-factoriopedia-rename-refined-rare-metals-recipe=Rename refined rare metals conversion recipe

[mod-setting-description]
ultracube-on-factoriopedia-rename-refined-rare-metals-recipe=When enabled, renames Ultracube's "cube-refined-rare-metals" conversion recipe (which produces cube-rare-metals) to "cube-refined-rare-metals-conversion" so the cube-rare-metal-crushing recipe can be merged with the refined rare metals item page in Factoriopedia. Disable if it breaks compatibility with other mods that reference the recipe by name.
