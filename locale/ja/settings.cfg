[mod-setting-description]
ultracube-on-factoriopedia-rename-refined-rare-metals-recipe=有効時、Ultracube の "cube-refined-rare-metals" 変換レシピ (cube-rare-metals を生成) を "cube-refined-rare-metals-conversion" にリネームし、cube-rare-metal-crushing レシピを精錬希土類金属アイテムページと Factoriopedia 上で統合できるようにします。このレシピを名前で参照する他 mod との互換性問題が出た場合は無効化してください。
